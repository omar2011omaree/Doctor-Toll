<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tools</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#050505;
      overflow-x:hidden;
      color:white;
      min-height:100vh;
      position:relative;
    }

    .background{
      position:fixed;
      width:100%;
      height:100%;
      top:0;
      left:0;
      z-index:-1;
      overflow:hidden;
    }

    .line{
      position:absolute;
      width:2px;
      height:200px;
      background:linear-gradient(transparent,#00ffcc,transparent);
      animation:move 6s linear infinite;
      opacity:0.5;
    }

    @keyframes move{
      0%{
        transform:translateY(-200px);
      }
      100%{
        transform:translateY(120vh);
      }
    }

    header{
      text-align:center;
      padding:50px 20px;
    }

    header h1{
      font-size:55px;
      color:#00ffcc;
      margin-bottom:15px;
      text-shadow:0 0 15px #00ffcc;
    }

    header p{
      color:#bbb;
      font-size:18px;
    }

    .tools{
      width:90%;
      max-width:1200px;
      margin:auto;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:25px;
      padding-bottom:50px;
    }

    .tool-card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;
      padding:25px;
      backdrop-filter:blur(10px);
      transition:0.3s;
      box-shadow:0 0 15px rgba(0,255,204,0.1);
    }

    .tool-card:hover{
      transform:translateY(-8px);
      box-shadow:0 0 25px rgba(0,255,204,0.4);
      border-color:#00ffcc;
    }

    .tool-card h2{
      margin-bottom:10px;
      color:#00ffcc;
    }

    .tool-card p{
      color:#ccc;
      margin-bottom:20px;
      line-height:1.6;
    }

    .tool-card a{
      display:inline-block;
      text-decoration:none;
      background:#00ffcc;
      color:black;
      padding:12px 22px;
      border-radius:12px;
      font-weight:bold;
      transition:0.3s;
    }

    .tool-card a:hover{
      background:white;
      transform:scale(1.05);
    }

    footer{
      text-align:center;
      padding:20px;
      color:#777;
      margin-top:30px;
    }
  </style>
</head>
<body>

  <div class="background" id="background"></div>

  <header>
    <h1>My Tools</h1>
    <p>أفضل الأدوات الخاصة بي</p>
  </header>

  <section class="tools">

    <div class="tool-card">
      <h2>الأداة الأولى</h2>
      <p>وصف بسيط للأداة.</p>
      <a href="https://example.com" target="_blank">تحميل الأداة</a>
    </div>

    <div class="tool-card">
      <h2>الأداة الثانية</h2>
      <p>وصف بسيط للأداة.</p>
      <a href="https://example.com" target="_blank">تحميل الأداة</a>
    </div>

    <div class="tool-card">
      <h2>الأداة الثالثة</h2>
      <p>وصف بسيط للأداة.</p>
      <a href="https://example.com" target="_blank">تحميل الأداة</a>
    </div>

  </section>

  <footer>
    جميع الحقوق محفوظة © 2026
  </footer>

  <script>
    const background = document.getElementById("background");

    for(let i = 0; i < 35; i++){
      const line = document.createElement("div");
      line.classList.add("line");

      line.style.left = Math.random() * 100 + "vw";
      line.style.animationDuration = (Math.random() * 5 + 3) + "s";
      line.style.opacity = Math.random();
      line.style.height = (Math.random() * 250 + 100) + "px";

      background.appendChild(line);
    }
  </script>

</body>
</html>
